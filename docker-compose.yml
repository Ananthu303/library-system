services:

  redis:
    image: redis:7
    container_name: library_system_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: library_system_web
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  celery:
    build: .
    container_name: library_system_celery
    command: celery -A library_system worker -l info
    volumes:
      - .:/app
    depends_on:
      - redis

  celery-beat:
    build: .
    container_name: library_system_celery_beat
    command: celery -A library_system beat -l info
    volumes:
      - .:/app
    depends_on:
      - redis